<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>CYBER-PUP v6.0</title>
    <style>
        :root { 
            --blue: #00f2ff; --pink: #ff00ff; --green: #39ff14; --gold: #ffcf00; --bg: #050508; 
            --safe-top: env(safe-area-inset-top);
        }

        /* Prevent scrolling and zooming on mobile */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; touch-action: manipulation; }
        
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: white; overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        /* dynamic viewport height fixes mobile browser bar issues */
        #app {
            width: 100vw; height: 100dvh;
            display: flex; flex-direction: column;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            border: 1px solid #222;
        }

        /* Top Bar */
        .hud { 
            padding: calc(10px + var(--safe-top)) 15px 10px 15px; 
            background: rgba(0,0,0,0.85); border-bottom: 1px solid #333;
        }
        .currency-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .coins { color: var(--gold); font-size: 1.2rem; font-weight: bold; text-shadow: 0 0 8px var(--gold); }
        .streak { color: var(--blue); font-size: 0.7rem; letter-spacing: 1px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-bar { background: #000; height: 8px; border-radius: 4px; border: 1px solid #333; overflow: hidden; position: relative; margin-top: 4px; }
        .fill { height: 100%; width: 100%; transition: width 0.5s ease-out; }
        .stat-label { font-size: 0.6rem; color: #888; text-transform: uppercase; }

        /* Main Game Area */
        #viewport { 
            flex-grow: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; position: relative;
        }

        #sprite {
            width: 60vw; height: 60vw; max-width: 280px; max-height: 280px;
            background: url('cyberdog.png') no-repeat;
            background-size: 300% 200%;
            filter: drop-shadow(0 0 15px var(--blue));
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #log { 
            position: absolute; bottom: 10px; width: 90%; 
            font-size: 0.7rem; color: var(--green); text-align: center;
            height: 1.2rem; overflow: hidden; font-family: monospace;
        }

        /* Bottom Controls */
        .controls { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; 
            padding: 15px; background: #080808; border-top: 1px solid #222;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
        }

        .btn {
            background: #111; border: 1px solid var(--blue); color: var(--blue);
            padding: 18px 5px; border-radius: 12px; font-weight: bold; font-size: 0.8rem;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .btn:active { background: var(--blue); color: #000; transform: scale(0.95); }
        .btn span { font-size: 1.2rem; margin-bottom: 4px; }
        .btn-price { font-size: 0.6rem; opacity: 0.7; margin-top: 2px; }
        .btn:disabled { opacity: 0.3; border-color: #444; color: #444; }

        /* Floating FX */
        .fx { position: absolute; pointer-events: none; font-weight: bold; animation: popUp 0.8s ease-out forwards; z-index: 100; }
        @keyframes popUp { 0% { transform: scale(0.5); opacity: 1; } 100% { transform: translateY(-100px) scale(1.2); opacity: 0; } }

        /* Daily Modal */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: none; align-items: center; justify-content: center; }
        .overlay.active { display: flex; }
        .modal { background: #111; border: 2px solid var(--gold); padding: 30px; border-radius: 20px; text-align: center; width: 85%; }
        
        #game-timer { position: absolute; top: 20px; font-size: 2rem; color: var(--pink); font-weight: bold; display: none; text-shadow: 0 0 10px var(--pink); }
    </style>
</head>
<body>

<div id="app">
    <!-- Daily Reward -->
    <div id="daily-overlay" class="overlay">
        <div class="modal">
            <h2 style="color:var(--gold)">DAILY SYNC</h2>
            <p id="streak-info">Streak: 1 Day</p>
            <button onclick="claimReward()" style="width:100%; padding:15px; background:var(--gold); border:none; font-weight:bold; border-radius:10px;">COLLECT REWARD</button>
        </div>
    </div>

    <!-- Top HUD -->
    <div class="hud">
        <div class="currency-row">
            <div class="coins">₿ <span id="ui-bytes">0</span></div>
            <div class="streak">SYNC-LINK: <span id="ui-streak">1</span>D</div>
        </div>
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-label">Energy</div>
                <div class="stat-bar"><div id="bar-nrg" class="fill" style="background: var(--blue)"></div></div>
            </div>
            <div class="stat-item">
                <div class="stat-label">System</div>
                <div class="stat-bar"><div id="bar-hp" class="fill" style="background: var(--green)"></div></div>
            </div>
        </div>
    </div>

    <!-- Game Viewport -->
    <div id="viewport">
        <div id="game-timer">10s</div>
        <div id="sprite" onclick="handleTap(event)" style="background-position: 50% 0%;"></div>
        <div id="log">> System Online. TAP TO PET.</div>
    </div>

    <!-- Control Panel -->
    <div class="controls">
        <button class="btn" onclick="act('feed')"><span>🔋</span>FEED<div class="btn-price">20₿</div></button>
        <button class="btn" onclick="act('mine')"><span>⛏️</span>MINE<div class="btn-price">-30 NRG</div></button>
        <button class="btn" onclick="act('play')"><span>🎮</span>PLAY<div class="btn-price">FREE</div></button>
        <button class="btn" onclick="act('repair')"><span>🛠️</span>REPAIR<div class="btn-price">50₿</div></button>
    </div>
</div>

<script>
    // --- APP STATE ---
    let state = {
        bytes: 100, energy: 100, hp: 100, streak: 1, lastSync: 0
    };

    const poses = {
        idle: "50% 0%", play: "0% 0%", sleep: "100% 0%", shock: "0% 100%", eat: "50% 100%", happy: "100% 100%"
    };

    // --- AUDIO ---
    const actx = new (window.AudioContext || window.webkitAudioContext)();
    function beep(f, d, t='sine') {
        const o = actx.createOscillator(); const g = actx.createGain();
        o.type = t; o.frequency.value = f; g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + d);
        o.connect(g); g.connect(actx.destination); o.start(); o.stop(actx.currentTime + d);
    }

    // --- INIT ---
    function init() {
        const saved = localStorage.getItem('cyberpup_v6');
        if(saved) state = JSON.parse(saved);
        
        checkDaily();
        updateUI();

        // Passive drain: 1% every minute
        setInterval(() => {
            state.energy = Math.max(0, state.energy - 1);
            if(state.energy <= 0) state.hp = Math.max(0, state.hp - 1);
            updateUI(); save();
        }, 60000);
    }

    function checkDaily() {
        const now = Date.now();
        const day = 24 * 60 * 60 * 1000;
        if (now - state.lastSync > day) {
            if (now - state.lastSync > day * 2) state.streak = 1;
            document.getElementById('daily-overlay').classList.add('active');
            document.getElementById('streak-info').innerText = `Sync Link: ${state.streak} Day(s)`;
        }
    }

    function claimReward() {
        const reward = 100 * state.streak;
        state.bytes += reward;
        state.streak++;
        state.lastSync = Date.now();
        document.getElementById('daily-overlay').classList.remove('active');
        beep(800, 0.4); beep(1200, 0.4);
        updateUI(); save();
        msg(`Received ${reward}₿ Daily Sync Bonus!`);
    }

    // --- CORE GAMEPLAY ---
    function handleTap(e) {
        state.bytes += 1;
        state.energy = Math.max(0, state.energy - 0.05);
        
        const spr = document.getElementById('sprite');
        spr.style.transform = "scale(1.2) rotate(5deg)";
        spr.style.backgroundPosition = (Math.random() > 0.8) ? poses.happy : poses.shock;
        
        const touch = e.touches ? e.touches[0] : e;
        spawnFx(touch.clientX, touch.clientY, "+1₿", "var(--gold)");
        beep(1000, 0.05);

        setTimeout(() => {
            spr.style.transform = "scale(1)";
            spr.style.backgroundPosition = poses.idle;
        }, 200);

        updateUI(); save();
    }

    function act(type) {
        const spr = document.getElementById('sprite');
        if(type === 'feed') {
            if(state.bytes < 20) return msg("Insufficient Bytes.");
            state.bytes -= 20; state.energy = Math.min(100, state.energy + 25);
            spr.style.backgroundPosition = poses.eat;
            beep(200, 0.3, 'sawtooth');
            msg("Injecting power cells...");
        } 
        else if(type === 'repair') {
            if(state.bytes < 50) return msg("Insufficient Bytes.");
            state.bytes -= 50; state.hp = Math.min(100, state.hp + 40);
            beep(1500, 0.3);
            msg("Repairing physical chassis...");
        }
        else if(type === 'mine') {
            if(state.energy < 30) return msg("Energy too low.");
            runMining();
        }
        else if(type === 'play') {
            runMiniGame();
        }

        updateUI(); save();
        setTimeout(() => spr.style.backgroundPosition = poses.idle, 1000);
    }

    function runMining() {
        state.energy -= 30;
        msg("Mining Protocol: 10s...");
        let count = 0;
        let timer = setInterval(() => {
            state.bytes += 5;
            spawnFx(window.innerWidth/2, window.innerHeight/2, "+5₿", "var(--gold)");
            beep(150, 0.1, 'square');
            updateUI();
            count++;
            if(count >= 10) { clearInterval(timer); msg("Mining complete!"); save(); }
        }, 1000);
    }

    function runMiniGame() {
        msg("CATCH THE DATA!");
        const timerUI = document.getElementById('game-timer');
        timerUI.style.display = "block";
        let time = 10;
        let game = setInterval(() => {
            time--;
            timerUI.innerText = time + "s";
            spawnBit();
            if(time <= 0) {
                clearInterval(game);
                timerUI.style.display = "none";
                msg("Play Session Ended.");
            }
        }, 1000);
    }

    function spawnBit() {
        const bit = document.createElement('div');
        bit.className = 'fx';
        bit.innerHTML = "💾";
        bit.style.left = Math.random() * 80 + 10 + "vw";
        bit.style.top = "20vh";
        bit.style.fontSize = "2rem";
        bit.style.pointerEvents = "auto";
        bit.style.animation = "drop 2s linear forwards";
        
        bit.onclick = () => {
            state.bytes += 10;
            beep(2000, 0.05);
            bit.remove();
            updateUI();
        };
        
        document.getElementById('viewport').appendChild(bit);
        setTimeout(() => bit.remove(), 2000);
    }

    // --- UI TOOLS ---
    function updateUI() {
        document.getElementById('ui-bytes').innerText = Math.floor(state.bytes);
        document.getElementById('ui-streak').innerText = state.streak;
        document.getElementById('bar-nrg').style.width = state.energy + "%";
        document.getElementById('bar-hp').style.width = state.hp + "%";
        
        const spr = document.getElementById('sprite');
        if(state.energy < 15) spr.style.filter = "grayscale(1) contrast(0.5)";
        else spr.style.filter = "drop-shadow(0 0 15px var(--blue))";
    }

    function msg(m) { document.getElementById('log').innerText = "> " + m; }
    function save() { localStorage.setItem('cyberpup_v6', JSON.stringify(state)); }

    function spawnFx(x, y, txt, color) {
        const f = document.createElement('div');
        f.className = 'fx'; f.innerText = txt; f.style.color = color;
        f.style.left = x + "px"; f.style.top = y + "px";
        document.body.appendChild(f);
        setTimeout(() => f.remove(), 800);
    }

    init();
</script>

<style>
    /* Mini game drop animation */
    @keyframes drop { to { transform: translateY(80vh); opacity: 0; } }
</style>
</body>
</html>
